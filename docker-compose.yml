
# New-API Docker Compose Configuration
#
# Quick Start:
#   1. docker-compose up -d
#   2. Access at http://localhost:3000
#
# ⚠️  IMPORTANT: Change all default passwords before deploying to production!

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 国内拉取 Go 模块慢时改为 https://goproxy.cn,direct
        GOPROXY: https://proxy.golang.org,direct
        GOSUMDB: sum.golang.org
    image: dazeapi:local
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      # 使用命名卷，避免容器写日志触发 IDE 对工作区 logs/ 的文件监听
      - api_logs:/app/logs
    environment:
      - SQL_DSN=postgresql://root:Xdd20041031@postgres:5432/new-api # ⚠️ IMPORTANT: Change the password in production!
      - REDIS_CONN_STRING=redis://redis
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true # 是否启用错误日志记录 (Whether to enable error log recording)
      - BATCH_UPDATE_ENABLED=true  # 是否启用批量更新 (Whether to enable batch update)
      - CLAWD_SIDECAR_URL=http://agno:6000
#      - STREAMING_TIMEOUT=300  # 流模式无响应超时时间，单位秒，默认120秒，如果出现空补全可以尝试改为更大值 （Streaming timeout in seconds, default is 120s. Increase if experiencing empty completions）
#      - SESSION_SECRET=random_string  # 多机部署时设置，必须修改这个随机字符串！！ （multi-node deployment, set this to a random string!!!!!!!）
#      - SYNC_FREQUENCY=60  # Uncomment if regular database syncing is needed
#      - GOOGLE_ANALYTICS_ID=G-XXXXXXXXXX  # Google Analytics 的测量 ID (Google Analytics Measurement ID)
#      - UMAMI_WEBSITE_ID=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx  # Umami 网站 ID (Umami Website ID)
#      - UMAMI_SCRIPT_URL=https://analytics.umami.is/script.js  # Umami 脚本 URL，默认为官方地址 (Umami Script URL, defaults to official URL)

    depends_on:
      - redis
      - postgres
      - agno
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    networks:
      - new-api-network

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: Xdd20041031  # ⚠️ IMPORTANT: Change this password in production!
      POSTGRES_DB: new-api
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - new-api-network
    ports:
      - "5432:5432"  # Uncomment if you need to access PostgreSQL from outside Docker

  agno:
    build:
      context: ./agno_service
      dockerfile: Dockerfile
    container_name: agno-clawd
    restart: always
    environment:
      - SQL_DSN=postgresql://root:Xdd20041031@postgres:5432/new-api
      - CLAWD_LOG_DIR=/logs
      - TZ=Asia/Shanghai
    volumes:
      - api_logs:/logs:ro
      - clawd_lance:/data/lancedb
    depends_on:
      - postgres
    networks:
      - new-api-network
    ports:
      - "6000:6000"

volumes:
  pg_data:
  api_logs:
  clawd_lance:

networks:
  new-api-network:
    driver: bridge
