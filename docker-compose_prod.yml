version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: always
    ports:
      - "54321:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: Xdd20041031
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - uqapi-network

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    volumes:
      - ./redis_data:/data
    networks:
      - uqapi-network

  uqapi-1:
    image: dazey/dazeai:latest
    container_name: uqapi-1
    restart: always
    ports:
      - "5000:3000"
    environment:
      TZ: Asia/Shanghai
      SQL_DSN: postgres://root:Xdd20041031@postgres:5432/uqapi_1?sslmode=disable
      REDIS_CONN_STRING: redis://redis:6379/1
      CLAWD_SIDECAR_URL: http://agno-1:6000
    volumes:
      - ./uqapi-1_data:/data
    depends_on:
      - postgres
      - redis
      - agno-1
    networks:
      - uqapi-network

  uqapi-2:
    image: dazey/dazeai:latest
    container_name: uqapi-2
    restart: always
    ports:
      - "5001:3000"
    environment:
      TZ: Asia/Shanghai
      SQL_DSN: postgres://root:Xdd20041031@postgres:5432/uqapi_2?sslmode=disable
      REDIS_CONN_STRING: redis://redis:6379/2
    volumes:
      - ./uqapi-2_data:/data
    depends_on:
      - postgres
      - redis
    networks:
      - uqapi-network

  agno-1:
    image: dazey/clawd-agno:latest
    container_name: agno-1
    restart: always
    ports:
      - "6000:6000"
    environment:
      SQL_DSN: postgres://root:Xdd20041031@postgres:5432/uqapi_1?sslmode=disable
      CLAWD_LOG_DIR: /logs
      TZ: Asia/Shanghai
    volumes:
      - ./uqapi-1_data/logs:/logs:ro
      - ./uqapi-1_data/lancedb:/data/lancedb
      - ./uqapi-1_data/exports:/data/exports
    depends_on:
      - postgres
    networks:
      - uqapi-network

networks:
  uqapi-network:
    driver: bridge
